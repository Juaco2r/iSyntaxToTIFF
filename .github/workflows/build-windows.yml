name: Build iSyntaxToTIFF Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows no-SDK
    runs-on: windows-2022

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: isyntax_py37
          environment-file: environment.yml
          auto-activate-base: false

      - name: Diagnostic check
        run: |
          python -c "import sys; print(sys.executable); print(sys.version)"
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import tifffile; print('tifffile', tifffile.__version__)"
          python -c "import openphi; print('openphi OK')"
          python -c "import imagecodecs; print('imagecodecs OK')"

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm iSyntaxToTIFF.spec

      - name: Package Windows ZIP
        run: |
          if (Test-Path "dist\iSyntaxToTIFF\iSyntaxToTIFF.exe") {
            Compress-Archive -Path "dist\iSyntaxToTIFF\*" -DestinationPath "iSyntaxToTIFF-Windows-no-SDK.zip" -Force
          } else {
            Write-Host "EXE not found. Listing dist folder:"
            Get-ChildItem -Recurse dist
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iSyntaxToTIFF-Windows-no-SDK
          path: iSyntaxToTIFF-Windows-no-SDK.zip

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iSyntaxToTIFF-Windows-no-SDK.zip
