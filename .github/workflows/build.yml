name: Build iSyntaxToTIFF

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda Python 3.7
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: isyntax_py37
          python-version: "3.7"
          auto-activate-base: false
          channels: conda-forge,defaults

      - name: Install Windows dependencies
        shell: cmd /C CALL {0}
        run: |
          conda activate isyntax_py37
          set PYTHONNOUSERSITE=1
          python -m pip install --upgrade "pip<24"
          python -m pip install -r requirements-windows-py37.txt

      - name: Check Windows build environment
        shell: cmd /C CALL {0}
        run: |
          conda activate isyntax_py37
          set PYTHONNOUSERSITE=1
          python -c "import sys; print(sys.executable); print(sys.version)"
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import tifffile; print('tifffile OK:', tifffile.__version__)"
          python -c "import numpy; print('numpy OK:', numpy.__version__)"
          echo OpenPhi is tested inside the app after the Philips Pathology SDK is selected.

      - name: Build Windows app
        shell: cmd /C CALL {0}
        run: |
          conda activate isyntax_py37
          set PYTHONNOUSERSITE=1
          if exist "%GITHUB_WORKSPACE%\dist" rmdir /s /q "%GITHUB_WORKSPACE%\dist"
          if exist "%GITHUB_WORKSPACE%\build" rmdir /s /q "%GITHUB_WORKSPACE%\build"
          python -m PyInstaller --clean --noconfirm --distpath "%GITHUB_WORKSPACE%\dist" --workpath "%GITHUB_WORKSPACE%\build" "%GITHUB_WORKSPACE%\iSyntaxToTIFF.spec"
          echo Listing generated files:
          dir "%GITHUB_WORKSPACE%\dist" /s /b
          if not exist "%GITHUB_WORKSPACE%\dist\iSyntaxToTIFF" (
            echo Expected PyInstaller output folder was not created.
            dir "%GITHUB_WORKSPACE%" /s /b
            exit /b 1
          )

      - name: Package Windows app
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $distDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          $preferredAppDir = Join-Path $distDir "iSyntaxToTIFF"

          Write-Host "Workspace:" $env:GITHUB_WORKSPACE
          Write-Host "Listing dist contents:"
          if (Test-Path $distDir) {
            Get-ChildItem -Path $distDir -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "The dist folder was not created. Full workspace listing:"
            Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          if (Test-Path $preferredAppDir) {
            $appDir = $preferredAppDir
          } else {
            $appExe = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -File -Filter "iSyntaxToTIFF.exe" | Where-Object {
              $_.FullName -notmatch "\\build\\" -and $_.FullName -notmatch "\\__pycache__\\"
            } | Select-Object -First 1

            if (-not $appExe) {
              Write-Host "Could not find the iSyntaxToTIFF executable generated by PyInstaller."
              exit 1
            }
            $appDir = $appExe.Directory.FullName
          }

          Write-Host "Packaging folder:" $appDir
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "iSyntaxToTIFF-Windows.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $appDir "*") -DestinationPath $zipPath -Force
          Write-Host "Created package:" $zipPath

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: iSyntaxToTIFF-Windows
          path: iSyntaxToTIFF-Windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    container: ubuntu:20.04

    steps:
      - name: Install base tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            curl \
            zip \
            tar \
            python3.8 \
            python3.8-dev \
            python3.8-venv \
            python3-pip \
            build-essential \
            libgl1 \
            libglib2.0-0 \
            libx11-xcb1 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-randr0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-sync1 \
            libxcb-glx0

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Python dependencies
        run: |
          python3.8 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements-linux-py38.txt

      - name: Check Linux build environment
        run: |
          . .venv/bin/activate
          python -c "import sys; print(sys.executable); print(sys.version)"
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import tifffile; print('tifffile OK:', tifffile.__version__)"
          python -c "import numpy; print('numpy OK:', numpy.__version__)"
          echo "OpenPhi is tested inside the app after the Philips Pathology SDK is selected."

      - name: Build Linux app
        run: |
          . .venv/bin/activate
          rm -rf dist build
          python -m PyInstaller --clean --noconfirm --distpath "$GITHUB_WORKSPACE/dist" --workpath "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/iSyntaxToTIFF.spec"
          echo "Listing generated files:"
          find "$GITHUB_WORKSPACE/dist" -maxdepth 4 -print
          test -d "$GITHUB_WORKSPACE/dist/iSyntaxToTIFF"

      - name: Package Linux app
        run: |
          if [ -d "$GITHUB_WORKSPACE/dist/iSyntaxToTIFF" ]; then
            tar -czf "$GITHUB_WORKSPACE/iSyntaxToTIFF-Linux.tar.gz" -C "$GITHUB_WORKSPACE/dist" iSyntaxToTIFF
          else
            echo "Could not find Linux PyInstaller output."
            find "$GITHUB_WORKSPACE" -maxdepth 4 -print || true
            exit 1
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: iSyntaxToTIFF-Linux
          path: iSyntaxToTIFF-Linux.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/iSyntaxToTIFF-Windows/iSyntaxToTIFF-Windows.zip
            artifacts/iSyntaxToTIFF-Linux/iSyntaxToTIFF-Linux.tar.gz
