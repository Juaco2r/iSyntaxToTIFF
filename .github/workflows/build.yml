name: Build iSyntaxToTIFF

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda Python 3.7
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: isyntax_py37
          python-version: "3.7"
          auto-activate-base: false
          channels: conda-forge,defaults

      - name: Install Windows base packages
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location $env:GITHUB_WORKSPACE
          $env:PYTHONNOUSERSITE = "1"

          Write-Host "Conda info:"
          conda info

          Write-Host "Installing pip/setuptools/wheel inside isyntax_py37..."
          conda install -n isyntax_py37 -y pip setuptools wheel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          conda run -n isyntax_py37 python -m pip --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install Windows dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location $env:GITHUB_WORKSPACE
          $env:PYTHONNOUSERSITE = "1"

          conda run -n isyntax_py37 python -m pip install --upgrade "pip<24" setuptools wheel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          conda run -n isyntax_py37 python -m pip install -r requirements-windows-py37.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Check Windows build environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location $env:GITHUB_WORKSPACE
          $env:PYTHONNOUSERSITE = "1"

          conda run -n isyntax_py37 python -c "import sys; print(sys.executable); print(sys.version)"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          conda run -n isyntax_py37 python -m pip --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          conda run -n isyntax_py37 python -c "import PyQt5; print('PyQt5 OK')"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          conda run -n isyntax_py37 python -c "import tifffile; print('tifffile OK:', tifffile.__version__)"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          conda run -n isyntax_py37 python -c "import numpy; print('numpy OK:', numpy.__version__)"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          conda run -n isyntax_py37 python -m PyInstaller --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "OpenPhi/Philips SDK imports are tested inside the app after the Pathology SDK is selected."

      - name: Build and package Windows app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location $env:GITHUB_WORKSPACE
          $env:PYTHONNOUSERSITE = "1"

          $distDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          $buildDir = Join-Path $env:GITHUB_WORKSPACE "build"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "iSyntaxToTIFF-Windows.zip"

          if (Test-Path $distDir) { Remove-Item $distDir -Recurse -Force }
          if (Test-Path $buildDir) { Remove-Item $buildDir -Recurse -Force }
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }

          Write-Host "Running PyInstaller..."
          conda run -n isyntax_py37 python -m PyInstaller --clean --noconfirm --distpath "$distDir" --workpath "$buildDir" "$env:GITHUB_WORKSPACE\iSyntaxToTIFF.spec"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "Workspace after PyInstaller:"
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse | ForEach-Object { Write-Host $_.FullName }

          if (-not (Test-Path $distDir)) {
            Write-Host "PyInstaller completed but the dist folder was not created."
            exit 1
          }

          $appExe = Get-ChildItem -Path $distDir -Recurse -File -Filter "iSyntaxToTIFF.exe" | Select-Object -First 1
          if (-not $appExe) {
            Write-Host "Could not find iSyntaxToTIFF.exe inside dist."
            exit 1
          }

          $appDir = $appExe.Directory.FullName
          Write-Host "Packaging folder:" $appDir
          Compress-Archive -Path (Join-Path $appDir "*") -DestinationPath $zipPath -Force

          if (-not (Test-Path $zipPath)) {
            Write-Host "Package was not created."
            exit 1
          }

          Write-Host "Created package:" $zipPath

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: iSyntaxToTIFF-Windows
          path: iSyntaxToTIFF-Windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    container: ubuntu:20.04

    steps:
      - name: Install base tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            curl \
            zip \
            tar \
            python3.8 \
            python3.8-dev \
            python3.8-venv \
            python3-pip \
            build-essential \
            libgl1 \
            libglib2.0-0 \
            libx11-xcb1 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-randr0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-sync1 \
            libxcb-glx0

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Python dependencies
        run: |
          python3.8 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-linux-py38.txt

      - name: Check Linux build environment
        run: |
          . .venv/bin/activate
          python -c "import sys; print(sys.executable); print(sys.version)"
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import tifffile; print('tifffile OK:', tifffile.__version__)"
          python -c "import numpy; print('numpy OK:', numpy.__version__)"
          python -m PyInstaller --version
          echo "OpenPhi/Philips SDK imports are tested inside the app after the Pathology SDK is selected."

      - name: Build and package Linux app
        run: |
          . .venv/bin/activate
          rm -rf "$GITHUB_WORKSPACE/dist" "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/iSyntaxToTIFF-Linux.tar.gz"

          python -m PyInstaller --clean --noconfirm --distpath "$GITHUB_WORKSPACE/dist" --workpath "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/iSyntaxToTIFF.spec"

          echo "Workspace after PyInstaller:"
          find "$GITHUB_WORKSPACE" -maxdepth 5 -print

          if [ ! -d "$GITHUB_WORKSPACE/dist" ]; then
            echo "PyInstaller completed but the dist folder was not created."
            exit 1
          fi

          APP_BIN="$(find "$GITHUB_WORKSPACE/dist" -type f -name iSyntaxToTIFF | head -n 1)"
          if [ -z "$APP_BIN" ]; then
            echo "Could not find iSyntaxToTIFF binary inside dist."
            exit 1
          fi

          APP_DIR="$(dirname "$APP_BIN")"
          echo "Packaging folder: $APP_DIR"
          tar -czf "$GITHUB_WORKSPACE/iSyntaxToTIFF-Linux.tar.gz" -C "$APP_DIR" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: iSyntaxToTIFF-Linux
          path: iSyntaxToTIFF-Linux.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/iSyntaxToTIFF-Windows/iSyntaxToTIFF-Windows.zip
            artifacts/iSyntaxToTIFF-Linux/iSyntaxToTIFF-Linux.tar.gz
